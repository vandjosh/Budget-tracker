<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Budget Tracker</h1>

    <div class="card">
      <h2>Set Monthly Budget</h2>
      <form id="budget-form">
        <input type="number" id="budget-input" placeholder="Enter monthly budget" min="0" step="0.01" required />
        <button type="submit">Save Budget</button>
      </form>
    </div>

    <div class="summary">
      <div class="summary-box">
        <h3>Monthly Budget</h3>
        <p>$<span id="budget-total">0.00</span></p>
      </div>
      <div class="summary-box">
        <h3>Total Spent</h3>
        <p>$<span id="spent-total">0.00</span></p>
      </div>
      <div class="summary-box">
        <h3>Remaining</h3>
        <p>$<span id="remaining-total">0.00</span></p>
      </div>
    </div>

    <div class="card">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <input type="text" id="expense-name" placeholder="Expense name" required />
        <input type="number" id="expense-amount" placeholder="Amount" min="0" step="0.01" required />
        
        <select id="expense-category" required>
          <option value="">Select category</option>
          <option value="Food">Food</option>
          <option value="Gas">Gas</option>
          <option value="Bills">Bills</option>
          <option value="Shopping">Shopping</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Other">Other</option>
        </select>

        <input type="date" id="expense-date" required />
        <button type="submit">Add Expense</button>
      </form>
    </div>

    <div class="card">
      <h2>Expenses</h2>
      <ul id="expense-list"></ul>
    </div>

    <div class="card">
      <h2>Spending by Category</h2>
      <canvas id="categoryChart"></canvas>
    </div>

    <div class="card">
      <button id="clear-all-btn" class="danger">Clear All Data</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
